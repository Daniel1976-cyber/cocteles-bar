<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Cuba | Menú Imprimible</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

            <div class="print-divider"></div>

        <main id="print-menu-grid">
            <!-- Content will be mirrored from the data -->

        <footer class="print-footer">
            <div class="qr-section">
                <div class="qr-code" id="qrcode">
                    <!-- QR code will be generated here -->
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://cocteles-bar.vercel.app" alt="QR Code" class="qr-img">
                </div>
                <div class="qr-text">
                    <p>Escanea para ver la versión digital interactiva</p>
                </div>
            </div>
            <div class="print-motto">VIVE LA EXPERIENCIA CUBANA</div>
        </footer>
    </div>
