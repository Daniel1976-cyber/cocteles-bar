<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor de Cuba | Carta de Cócteles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <header class="hero">
        <div class="logo-container">
            <h1 class="brand-title">Sabor de Cuba</h1>
            <p class="brand-subtitle">Tradición · Ritmo · Autenticidad</p>
        </div>
        <div class="scroll-indicator">
            <span>Explorar Carta</span>
            <div class="arrow"></div>
        </div>
    </header>

    <section class="featured-section reveal">
        <div class="featured-card">
            <img src="images/mojito.png" alt="Mojito Clásico" class="featured-img">
            <div class="featured-info">
                <h3>Mojito Clásico</h3>
                <p>Nuestra firma. Mentas frescas y ron cubano premium.</p>
            </div>
        </div>
        <div class="featured-card">
            <img src="images/pina_colada.png" alt="Piña Colada" class="featured-img">
            <div class="featured-info">
                <h3>Piña Colada</h3>
                <p>Cremosidad tropical en estado puro.</p>
            </div>
        </div>
    </section>

    <main id="menu-container">
        <!-- Categories and cocktails will be rendered here -->
    </main>

    <footer class="footer">
        <p>© 2026 Sabor de Cuba. Vive la experiencia cubana.</p>
        <div class="footer-motto">Música · Sabor · Tradición</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
